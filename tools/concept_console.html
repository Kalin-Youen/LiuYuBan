<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>概念自组织控制台</title>
  <style>
    :root {
      --bg: #f6f7f8;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #65707c;
      --line: #d9dee4;
      --accent: #0f766e;
      --accent-weak: #e6f4f1;
      --warn: #b45309;
      --bad: #b42318;
      --good: #047857;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    h1 { font-size: 20px; margin: 0; }
    main { padding: 18px 24px 32px; display: grid; gap: 16px; }
    .toolbar, .summary, .run, .candidate, .aggregate {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .toolbar { padding: 14px; display: flex; flex-wrap: wrap; gap: 12px; align-items: end; }
    label { display: grid; gap: 4px; color: var(--muted); font-size: 12px; }
    input {
      min-width: 90px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 9px;
      font: inherit;
    }
    textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 9px;
      font: inherit;
      background: #fff;
    }
    textarea { min-height: 70px; resize: vertical; }
    button {
      border: 0;
      border-radius: 6px;
      padding: 9px 12px;
      background: var(--accent);
      color: #fff;
      font-weight: 650;
      cursor: pointer;
    }
    button.secondary { background: #344054; }
    button.danger { background: var(--bad); }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .summary { padding: 12px 14px; display: flex; flex-wrap: wrap; gap: 10px; color: var(--muted); }
    .aggregate { padding: 14px; display: grid; gap: 12px; }
    .section-title { font-size: 16px; font-weight: 800; margin: 0; }
    .columns { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .list { margin: 0; padding-left: 18px; color: #334155; }
    .list li { margin: 4px 0; }
    .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 6px; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; background: #fff; }
    th, td { padding: 8px 10px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    th { font-size: 12px; color: var(--muted); background: #f8fafc; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef1f4;
      color: #334155;
      white-space: nowrap;
    }
    .chip.good { color: var(--good); background: #e8f5ee; }
    .chip.warn { color: var(--warn); background: #fff4e5; }
    .runs { display: grid; gap: 14px; }
    .run { overflow: hidden; }
    .run-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .run-title { font-weight: 750; }
    .run-meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .candidates { padding: 12px; display: grid; gap: 10px; }
    .candidate { padding: 12px; display: grid; gap: 8px; }
    .candidate-title { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; font-weight: 700; }
    .statement { color: #334155; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
    .metric { background: #f8fafc; border: 1px solid var(--line); border-radius: 6px; padding: 8px; }
    .metric span { display: block; color: var(--muted); font-size: 12px; }
    .reason { color: var(--muted); }
    .empty { padding: 28px; text-align: center; color: var(--muted); }
    .quick-deck { display: grid; gap: 12px; }
    .deck-card {
      min-height: 280px;
      padding: 14px;
      display: grid;
      gap: 12px;
      touch-action: pan-y;
      user-select: none;
    }
    .deck-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .deck-title { font-size: 18px; font-weight: 800; line-height: 1.25; }
    .deck-kind { flex: 0 0 auto; }
    .deck-body { color: #334155; font-size: 15px; }
    .deck-meta { display: grid; gap: 6px; color: var(--muted); }
    .deck-actions { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; }
    .deck-actions button { min-height: 42px; padding: 8px 6px; }
    .deck-actions .reject { background: var(--bad); }
    .deck-nav { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .deck-nav button { min-width: 44px; }
    .deck-progress { color: var(--muted); font-weight: 700; }
    .potential-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .potential-card { border: 1px solid var(--line); border-radius: 8px; padding: 10px; display: grid; gap: 8px; background: #fff; }
    .score-bar { height: 8px; overflow: hidden; border-radius: 999px; background: #e5e7eb; }
    .score-fill { height: 100%; background: var(--accent); border-radius: inherit; }
    .potential-name { display: flex; justify-content: space-between; gap: 8px; font-weight: 800; }
    .potential-note { color: var(--muted); font-size: 13px; }
    .mobile-ask-bar { display: none; }
    @media (max-width: 820px) {
      header { align-items: flex-start; flex-direction: column; }
      main { padding: 12px 12px 118px; }
      .grid { grid-template-columns: 1fr 1fr; }
      .columns { grid-template-columns: 1fr; }
      .toolbar { align-items: stretch; }
      .toolbar button { flex: 1 1 auto; min-height: 42px; }
      .summary { overflow-x: auto; flex-wrap: nowrap; }
      .aggregate { padding: 12px; }
      .potential-grid { grid-template-columns: 1fr; }
      .deck-actions { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .deck-title { font-size: 17px; }
      .mobile-ask-bar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 30;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
        border-top: 1px solid var(--line);
        background: rgba(255, 255, 255, .96);
        box-shadow: 0 -8px 24px rgba(15, 23, 42, .08);
      }
      .mobile-ask-bar textarea {
        min-height: 44px;
        max-height: 92px;
        resize: none;
      }
      .mobile-ask-bar button { min-width: 68px; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>概念自组织控制台</h1>
      <div class="run-meta">查看机器概念组合、AI 深评、去向、风险与自动运行状态</div>
    </div>
    <button class="secondary" id="refreshBtn">刷新</button>
  </header>

  <main>
    <section class="toolbar">
      <label>候选数
        <input id="countInput" type="number" min="1" max="24" value="6">
      </label>
      <label>随机种子
        <input id="seedInput" type="number" placeholder="可空">
      </label>
      <label>循环间隔（秒）
        <input id="intervalInput" type="number" min="60" value="900">
      </label>
      <label>使用 AI 深评
        <input id="useAiInput" type="checkbox" checked>
      </label>
      <button id="runBtn">运行一次</button>
      <button id="startBtn" class="secondary">启动循环</button>
      <button id="stopBtn" class="danger">停止循环</button>
      <button id="researchBtn" class="secondary">生成研究卡</button>
      <button id="webBtn" class="secondary">联网取证</button>
      <button id="agentBtn" class="secondary">智能体会商</button>
    </section>

    <section class="toolbar">
      <label style="flex: 1 1 420px;">人类问题
        <textarea id="questionInput" placeholder="例如：物质母网是什么？你觉得它重要吗？">物质母网是什么？你觉得它重要吗？</textarea>
      </label>
      <button id="qaBtn" class="secondary">问系统</button>
    </section>

    <section class="summary" id="summary"></section>
    <section class="aggregate quick-deck" id="quickDeck"></section>
    <section class="aggregate" id="potentialMap"></section>
    <section class="aggregate" id="aggregate"></section>
    <section class="aggregate" id="research"></section>
    <section class="aggregate" id="webEvidence"></section>
    <section class="aggregate" id="agents"></section>
    <section class="aggregate" id="humanQa"></section>
    <section class="runs" id="runs"></section>
  </main>

  <section class="mobile-ask-bar">
    <textarea id="mobileQuestionInput" placeholder="快速提问"></textarea>
    <button id="mobileQaBtn">发送</button>
  </section>

  <script>
    const $ = (id) => document.getElementById(id);
    const state = { busy: false, deckCards: [], deckIndex: 0, touchStartX: null };

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, (m) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[m]));
    }

    async function postJson(url, body) {
      const resp = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body || {})
      });
      return resp.json();
    }

    function formBody() {
      return {
        count: Number($("countInput").value || 6),
        seed: $("seedInput").value || null,
        interval_seconds: Number($("intervalInput").value || 900),
        use_ai: $("useAiInput").checked
      };
    }

    function collectDeckCards(aggregatePayload, researchPayload, agentsPayload) {
      const agg = aggregatePayload.aggregate || {};
      const cards = [];
      (agentsPayload.cycles?.[0]?.human_requests || []).forEach((item) => {
        cards.push({
          kind: "需人裁定",
          task_id: item.task_id,
          concepts: item.concepts,
          title: item.concepts || item.task_id,
          body: item.message || (item.questions || []).join("；"),
          detail: (item.questions || []).join("；")
        });
      });
      (researchPayload.cycles?.[0]?.cards || []).slice(0, 8).forEach((item) => {
        cards.push({
          kind: "研究卡",
          task_id: item.candidate_id || item.concepts,
          concepts: item.concepts,
          title: item.concepts,
          body: item.research_question,
          detail: item.writeback_proposal || item.working_hypothesis
        });
      });
      (agg.writable_candidates || []).slice(0, 8).forEach((item) => {
        cards.push({
          kind: "可回写",
          task_id: item.id || item.concepts,
          concepts: item.concepts,
          title: item.concepts,
          body: item.statement,
          detail: item.ai_reason || item.order_reason
        });
      });
      const seen = new Set();
      return cards.filter((item) => {
        const key = `${item.kind}:${item.task_id}:${item.concepts}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function renderQuickDeck(aggregatePayload, researchPayload, agentsPayload) {
      state.deckCards = collectDeckCards(aggregatePayload, researchPayload, agentsPayload);
      if (state.deckIndex >= state.deckCards.length) state.deckIndex = 0;
      const total = state.deckCards.length;
      if (!total) {
        $("quickDeck").innerHTML = `
          <h2 class="section-title">快速卡片</h2>
          <div class="empty">暂无可操作卡片。先运行研究卡或智能体会商。</div>
        `;
        return;
      }
      const item = state.deckCards[state.deckIndex];
      $("quickDeck").innerHTML = `
        <div class="deck-nav">
          <button class="secondary" id="deckPrevBtn" aria-label="上一张">‹</button>
          <div class="deck-progress">${state.deckIndex + 1} / ${total}</div>
          <button class="secondary" id="deckNextBtn" aria-label="下一张">›</button>
        </div>
        <article class="candidate deck-card" id="deckCard">
          <div class="deck-top">
            <div class="deck-title">${esc(item.title || "-")}</div>
            <span class="chip warn deck-kind">${esc(item.kind)}</span>
          </div>
          <div class="deck-body">${esc(item.body || "-")}</div>
          <div class="deck-meta">
            <div>依据：${esc(item.detail || "-")}</div>
            <div>任务：${esc(item.task_id || "-")}</div>
          </div>
          <div class="deck-actions">
            <button data-quick-decision="主书">主书</button>
            <button data-quick-decision="专题" class="secondary">专题</button>
            <button data-quick-decision="工具卡" class="secondary">工具卡</button>
            <button data-quick-decision="残差" class="secondary">残差</button>
            <button data-quick-decision="拒绝" class="reject">拒绝</button>
          </div>
        </article>
      `;
      $("deckPrevBtn").onclick = () => moveDeck(-1);
      $("deckNextBtn").onclick = () => moveDeck(1);
      $("deckCard").ontouchstart = (event) => {
        state.touchStartX = event.changedTouches[0].clientX;
      };
      $("deckCard").ontouchend = (event) => {
        if (state.touchStartX === null) return;
        const delta = event.changedTouches[0].clientX - state.touchStartX;
        state.touchStartX = null;
        if (Math.abs(delta) > 48) moveDeck(delta < 0 ? 1 : -1);
      };
      document.querySelectorAll("[data-quick-decision]").forEach((button) => {
        button.onclick = () => quickDecision(button.dataset.quickDecision);
      });
    }

    function renderPotentialMap(payload) {
      const potential = payload.potential || {};
      const summary = potential.summary || {};
      const dims = potential.dimensions || [];
      const roadmap = (potential.roadmap || []).map((item) => `
        <li>${esc(item.stage)}：${esc(item.action)}（${esc(item.success_signal)}）</li>
      `).join("");
      const warnings = (potential.warning_signals || []).map((item) => `<li>${esc(item)}</li>`).join("");
      const cards = dims.map((item) => {
        const score = Math.round(Number(item.score || 0) * 100);
        return `
          <article class="potential-card">
            <div class="potential-name">
              <span>${esc(item.name)}</span>
              <span>${score}</span>
            </div>
            <div class="score-bar"><div class="score-fill" style="width:${score}%"></div></div>
            <div>${esc(item.signal)}</div>
            <div class="potential-note">风险：${esc(item.risk)}</div>
            <div class="potential-note">下一步：${esc(item.next)}</div>
          </article>
        `;
      }).join("");
      $("potentialMap").innerHTML = `
        <h2 class="section-title">项目潜力图谱</h2>
        <div class="summary">
          <span class="chip good">总分 ${Math.round(Number(summary.overall_score || 0) * 100)}</span>
          <span class="chip warn">当前主攻 ${esc(summary.next_focus || "-")}</span>
          <span class="chip">强项 ${esc((summary.strongest || []).join("、") || "-")}</span>
          <span class="chip">瓶颈 ${esc((summary.bottlenecks || []).join("、") || "-")}</span>
        </div>
        <div class="potential-grid">${cards || "<div class='empty'>暂无潜力数据</div>"}</div>
        <div class="columns">
          <div>
            <h3 class="section-title">路线</h3>
            <ul class="list">${roadmap || "<li>暂无</li>"}</ul>
          </div>
          <div>
            <h3 class="section-title">失衡信号</h3>
            <ul class="list">${warnings || "<li>暂无</li>"}</ul>
          </div>
        </div>
      `;
    }

    function moveDeck(delta) {
      if (!state.deckCards.length) return;
      state.deckIndex = (state.deckIndex + delta + state.deckCards.length) % state.deckCards.length;
      refresh();
    }

    async function quickDecision(decision) {
      const item = state.deckCards[state.deckIndex];
      if (!item) return;
      await postJson("/api/human-feedback", {
        task_id: item.task_id || "",
        concepts: item.concepts || item.title || "",
        decision,
        notes: `手机快速裁定：${item.kind}`
      });
      moveDeck(1);
    }

    function renderSummary(payload) {
      const loop = payload.loop || {};
      const runs = payload.runs || [];
      const latest = runs[0];
      $("summary").innerHTML = `
        <span class="chip ${loop.running ? "good" : ""}">循环：${loop.running ? "运行中" : "停止"}</span>
        <span class="chip">批次数：${runs.length}</span>
        <span class="chip">最近批次：${latest ? esc(latest.created_at) : "-"}</span>
        <span class="chip">最近候选：${latest ? latest.candidate_count : 0}</span>
        <span class="chip">最近深评：${latest ? latest.reviewed_count : 0}</span>
        <span class="chip ${loop.last_error ? "warn" : ""}">错误：${loop.last_error ? esc(loop.last_error).slice(0, 120) : "无"}</span>
      `;
    }

    function candidateHtml(item) {
      const missing = (item.missing_prerequisites || []).join("；") || "-";
      const risks = (item.risks || []).join("；") || "-";
      return `
        <article class="candidate">
          <div class="candidate-title">
            <span>${esc(item.id)}</span>
            <span>${esc(item.concepts)}</span>
            <span class="chip ${item.ai_verdict === "keep" ? "good" : item.ai_verdict === "unreviewed" ? "warn" : ""}">${esc(item.ai_verdict)}</span>
            <span class="chip">${esc(item.ai_target)}</span>
          </div>
          <div class="statement">${esc(item.statement)}</div>
          <div class="grid">
            <div class="metric"><span>阶段</span>${esc(item.curriculum_stage)}</div>
            <div class="metric"><span>权重</span>${esc(item.training_weight)}</div>
            <div class="metric"><span>启发式分数</span>${esc(item.heuristic_score)}</div>
            <div class="metric"><span>建议动作</span>${esc(item.action)}</div>
          </div>
          <div class="reason">排序理由：${esc(item.order_reason)}</div>
          <div class="reason">缺失先修：${esc(missing)}</div>
          <div class="reason">AI 理由：${esc(item.ai_reason || "-")}</div>
          <div class="reason">风险：${esc(item.ai_risk || risks)}</div>
        </article>
      `;
    }

    function renderRuns(payload) {
      const runs = payload.runs || [];
      if (!runs.length) {
        $("runs").innerHTML = `<div class="empty">还没有运行记录</div>`;
        return;
      }
      $("runs").innerHTML = runs.slice(0, 12).map((run) => `
        <section class="run">
          <div class="run-head">
            <div>
              <div class="run-title">${esc(run.created_at || run.file)}</div>
              <div class="run-meta">${esc(run.file)} · 模型：${esc(run.ai_model || "-")}</div>
            </div>
            <div>
              <span class="chip">候选 ${run.candidate_count}</span>
              <span class="chip">深评 ${run.reviewed_count}</span>
              <span class="chip good">keep ${run.keep_count}</span>
            </div>
          </div>
          <div class="candidates">
            ${(run.candidates || []).map(candidateHtml).join("")}
          </div>
        </section>
      `).join("");
    }

    function renderAggregate(payload) {
      const agg = payload.aggregate || {};
      const targetRows = Object.entries(agg.target_counts || {}).map(([name, count]) =>
        `<span class="chip">${esc(name)} ${count}</span>`
      ).join("");
      const topConcepts = (agg.top_concepts || []).map(([name, count]) =>
        `<li>${esc(name)}：${count}</li>`
      ).join("");
      const repeated = (agg.repeated_pairs || []).slice(0, 8).map((item) => `
        <tr>
          <td>${esc(item.concepts)}</td>
          <td>${esc(item.count)}</td>
          <td>${esc(item.keep)}</td>
          <td>${esc(item.keep_rate)}</td>
          <td>${esc(item.avg_weight)}</td>
          <td>${esc(Object.entries(item.targets || {}).map(([k, v]) => `${k}:${v}`).join("；") || "-")}</td>
        </tr>
      `).join("");
      const writable = (agg.writable_candidates || []).slice(0, 8).map((item) => `
        <tr>
          <td>${esc(item.concepts)}</td>
          <td>${esc(item.ai_target)}</td>
          <td>${esc(item.ai_score ?? "-")}</td>
          <td>${esc(item.training_weight)}</td>
          <td>${esc(item.statement)}</td>
          <td>${esc(item.ai_reason || "-")}</td>
        </tr>
      `).join("");
      const risks = (agg.high_risk_candidates || []).slice(0, 6).map((item) => `
        <li>${esc(item.concepts)}：${esc(item.ai_risk || (item.risks || []).join("；") || "-")}</li>
      `).join("");

      $("aggregate").innerHTML = `
        <h2 class="section-title">有用性总览</h2>
        <div class="summary">
          <span class="chip good">${esc(agg.judgement || "等待样本")}</span>
          <span class="chip">候选 ${esc(agg.candidate_count || 0)}</span>
          <span class="chip">已复核 ${esc(agg.reviewed_count || 0)}</span>
          <span class="chip good">keep ${esc(agg.keep_count || 0)}</span>
          <span class="chip">keep率 ${esc(agg.keep_rate || 0)}</span>
          <span class="chip ${agg.unreviewed_count ? "warn" : ""}">未复核 ${esc(agg.unreviewed_count || 0)}</span>
          ${targetRows}
        </div>
        <div class="columns">
          <div>
            <h3 class="section-title">高频概念</h3>
            <ul class="list">${topConcepts || "<li>暂无</li>"}</ul>
          </div>
          <div>
            <h3 class="section-title">风险候选</h3>
            <ul class="list">${risks || "<li>暂无</li>"}</ul>
          </div>
        </div>
        <h3 class="section-title">重复组合</h3>
        <div class="table-wrap">
          <table>
            <thead><tr><th>组合</th><th>次数</th><th>keep</th><th>keep率</th><th>均权重</th><th>去向</th></tr></thead>
            <tbody>${repeated || "<tr><td colspan='6'>暂无重复组合</td></tr>"}</tbody>
          </table>
        </div>
        <h3 class="section-title">可回写候选</h3>
        <div class="table-wrap">
          <table>
            <thead><tr><th>组合</th><th>去向</th><th>AI分</th><th>权重</th><th>候选句</th><th>理由</th></tr></thead>
            <tbody>${writable || "<tr><td colspan='6'>暂无可回写候选</td></tr>"}</tbody>
          </table>
        </div>
      `;
    }

    function renderResearch(payload) {
      const cycles = payload.cycles || [];
      if (!cycles.length) {
        $("research").innerHTML = `
          <h2 class="section-title">研究循环</h2>
          <div class="empty">还没有研究卡。点击“生成研究卡”，把候选推进为可验证任务。</div>
        `;
        return;
      }
      const latest = cycles[0];
      const cards = (latest.cards || []).slice(0, 8).map((card) => `
        <article class="candidate">
          <div class="candidate-title">
            <span>${esc(card.concepts)}</span>
            <span class="chip">${esc(card.target)}</span>
          </div>
          <div class="statement">${esc(card.research_question)}</div>
          <div class="reason">假设：${esc(card.working_hypothesis)}</div>
          <div class="reason">回写：${esc(card.writeback_proposal)}</div>
          <div class="reason">失败条件：${esc((card.failure_conditions || []).join("；"))}</div>
        </article>
      `).join("");
      $("research").innerHTML = `
        <h2 class="section-title">研究循环</h2>
        <div class="summary">
          <span class="chip">循环数 ${cycles.length}</span>
          <span class="chip">最新 ${esc(latest.created_at || "-")}</span>
          <span class="chip">研究卡 ${esc(latest.card_count || 0)}</span>
          <span class="chip ${latest.ai_error ? "warn" : "good"}">AI ${latest.ai_error ? "有错误" : latest.ai_enabled ? "已深化" : "未启用"}</span>
        </div>
        <div class="candidates">${cards}</div>
      `;
    }

    function renderWebEvidence(payload) {
      const batches = payload.batches || [];
      if (!batches.length) {
        $("webEvidence").innerHTML = `
          <h2 class="section-title">联网证据</h2>
          <div class="empty">还没有联网证据。点击“联网取证”，让系统为研究卡寻找外部材料。</div>
        `;
        return;
      }
      const latest = batches[0];
      const cards = (latest.cards || []).slice(0, 5).map((card) => {
        const evidence = (card.evidence || []).slice(0, 3).map((item) => `
          <li>
            <a href="${esc(item.url)}" target="_blank" rel="noreferrer">${esc(item.title || item.url)}</a>
            <br><span class="chip">${esc(item.quality || "-")} ${esc(item.quality_score ?? "-")}</span>
            <span class="chip">相关 ${esc(item.relevance ?? "-")}</span>
            <br>${esc(item.snippet || "-")}
          </li>
        `).join("");
        return `
          <article class="candidate">
            <div class="candidate-title">
              <span>${esc(card.concepts)}</span>
              <span class="chip">${esc((card.evidence || []).length)} 条证据</span>
              <span class="chip warn">${esc((card.rejected || []).length)} 条过滤</span>
            </div>
            <div class="reason">查询：${esc(card.query || "-")}</div>
            <ul class="list">${evidence || "<li>未抓取到可用网页</li>"}</ul>
          </article>
        `;
      }).join("");
      $("webEvidence").innerHTML = `
        <h2 class="section-title">联网证据</h2>
        <div class="summary">
          <span class="chip">批次数 ${batches.length}</span>
          <span class="chip">最新 ${esc(latest.created_at || "-")}</span>
          <span class="chip">研究卡 ${esc(latest.card_count || 0)}</span>
          <span class="chip good">证据 ${esc(latest.evidence_count || 0)}</span>
          <span class="chip warn">过滤 ${esc(latest.rejected_count || 0)}</span>
        </div>
        <div class="candidates">${cards}</div>
      `;
    }

    function renderAgents(payload, feedbackPayload) {
      const cycles = payload.cycles || [];
      const feedback = feedbackPayload.feedback || [];
      if (!cycles.length) {
        $("agents").innerHTML = `
          <h2 class="section-title">智能体分工</h2>
          <div class="empty">还没有智能体会商。点击“智能体会商”，让编排者、证据员、批判者、学习设计者和人类联络员一起处理研究卡。</div>
        `;
        return;
      }
      const latest = cycles[0];
      const requests = (latest.human_requests || []).map((item) => `
        <article class="candidate">
          <div class="candidate-title">
            <span>${esc(item.task_id)}</span>
            <span>${esc(item.concepts)}</span>
            <span class="chip warn">请求人类意见</span>
          </div>
          <div class="statement">${esc(item.message)}</div>
          <ul class="list">${(item.questions || []).map((q) => `<li>${esc(q)}</li>`).join("")}</ul>
          <div class="grid">
            <label>裁定
              <select data-field="decision" data-task="${esc(item.task_id)}">
                <option value="工具卡">工具卡</option>
                <option value="专题">专题</option>
                <option value="主书">主书</option>
                <option value="残差">残差</option>
                <option value="拒绝">拒绝</option>
              </select>
            </label>
            <label>检索提示
              <input data-field="search_hint" data-task="${esc(item.task_id)}" placeholder="关键词 / 论文 / 作者">
            </label>
          </div>
          <label>正例
            <textarea data-field="example" data-task="${esc(item.task_id)}" placeholder="给一个现实例子"></textarea>
          </label>
          <label>边界
            <textarea data-field="boundary" data-task="${esc(item.task_id)}" placeholder="适用边界或误用风险"></textarea>
          </label>
          <label>备注
            <textarea data-field="notes" data-task="${esc(item.task_id)}" placeholder="其他判断"></textarea>
          </label>
          <button data-save-feedback="${esc(item.task_id)}" data-concepts="${esc(item.concepts)}">保存人类反馈</button>
        </article>
      `).join("");
      const recent = feedback.slice(0, 5).map((item) => `
        <li>${esc(item.created_at)} ｜ ${esc(item.concepts)} ｜ ${esc(item.decision)} ｜ ${esc(item.search_hint || item.boundary || "-")}</li>
      `).join("");
      $("agents").innerHTML = `
        <h2 class="section-title">智能体分工</h2>
        <div class="summary">
          <span class="chip">会商数 ${cycles.length}</span>
          <span class="chip">最新 ${esc(latest.created_at || "-")}</span>
          <span class="chip">任务 ${esc(latest.task_count || 0)}</span>
          <span class="chip warn">人类请求 ${esc(latest.human_request_count || 0)}</span>
          <span class="chip ${latest.ai_error ? "warn" : latest.ai_enabled ? "good" : ""}">AI ${latest.ai_error ? "有错误" : latest.ai_enabled ? "已复核" : "未启用"}</span>
        </div>
        <div class="candidates">${requests || "<div class='empty'>暂无需要询问人的问题</div>"}</div>
        <h3 class="section-title">最近人类反馈</h3>
        <ul class="list">${recent || "<li>暂无反馈</li>"}</ul>
      `;
      document.querySelectorAll("[data-save-feedback]").forEach((button) => {
        button.onclick = () => saveFeedback(button.dataset.saveFeedback, button.dataset.concepts);
      });
    }

    async function saveFeedback(taskId, concepts) {
      const fields = {};
      document.querySelectorAll(`[data-task="${CSS.escape(taskId)}"]`).forEach((node) => {
        fields[node.dataset.field] = node.value;
      });
      await postJson("/api/human-feedback", { task_id: taskId, concepts, ...fields });
      await refresh();
    }

    function renderHumanQa(payload) {
      const answers = payload.answers || [];
      if (!answers.length) {
        $("humanQa").innerHTML = `
          <h2 class="section-title">人类问答</h2>
          <div class="empty">还没有问答记录。输入问题后点击“问系统”，系统会依据本地文稿、研究卡和联网证据回答，并标出边界。</div>
        `;
        return;
      }
      const latest = answers[0];
      const why = (latest.why_important || []).map((item) => `<li>${esc(item)}</li>`).join("");
      const limits = (latest.limits || []).map((item) => `<li>${esc(item)}</li>`).join("");
      const next = (latest.next_steps || []).map((item) => `<li>${esc(item)}</li>`).join("");
      const paths = (latest.evidence_paths || []).map((item) => `<li>${esc(item)}</li>`).join("");
      const hits = (latest.local_hits || []).slice(0, 4).map((item) => `
        <article class="candidate">
          <div class="candidate-title">
            <span>${esc(item.path)}</span>
            <span class="chip">匹配 ${esc(item.score)}</span>
          </div>
          <div class="reason">${esc(item.snippet)}</div>
        </article>
      `).join("");
      $("humanQa").innerHTML = `
        <h2 class="section-title">人类问答</h2>
        <div class="summary">
          <span class="chip">记录 ${answers.length}</span>
          <span class="chip">最新 ${esc(latest.created_at || "-")}</span>
          <span class="chip good">重要性 ${esc(latest.importance || "待定")}</span>
          <span class="chip">${esc(latest.file || "-")}</span>
        </div>
        <article class="candidate">
          <div class="candidate-title">
            <span>问题</span>
            <span>${esc(latest.question)}</span>
          </div>
          <div class="statement">${esc(latest.answer)}</div>
        </article>
        <div class="columns">
          <div>
            <h3 class="section-title">为什么重要</h3>
            <ul class="list">${why || "<li>暂无</li>"}</ul>
          </div>
          <div>
            <h3 class="section-title">边界</h3>
            <ul class="list">${limits || "<li>暂无</li>"}</ul>
          </div>
        </div>
        <div class="columns">
          <div>
            <h3 class="section-title">下一步</h3>
            <ul class="list">${next || "<li>暂无</li>"}</ul>
          </div>
          <div>
            <h3 class="section-title">依据路径</h3>
            <ul class="list">${paths || "<li>暂无</li>"}</ul>
          </div>
        </div>
        <h3 class="section-title">本地命中</h3>
        <div class="candidates">${hits || "<div class='empty'>暂无本地命中</div>"}</div>
      `;
    }

    async function refresh() {
      const payload = await fetch("/api/runs").then((r) => r.json());
      const aggregate = await fetch("/api/aggregate").then((r) => r.json());
      const research = await fetch("/api/research-cycles").then((r) => r.json());
      const webEvidence = await fetch("/api/web-evidence").then((r) => r.json());
      const agents = await fetch("/api/agent-cycles").then((r) => r.json());
      const humanFeedback = await fetch("/api/human-feedback").then((r) => r.json());
      const humanQa = await fetch("/api/human-qa").then((r) => r.json());
      const potential = await fetch("/api/potential-map").then((r) => r.json());
      renderSummary(payload);
      renderQuickDeck(aggregate, research, agents);
      renderPotentialMap(potential);
      renderAggregate(aggregate);
      renderResearch(research);
      renderWebEvidence(webEvidence);
      renderAgents(agents, humanFeedback);
      renderHumanQa(humanQa);
      renderRuns(payload);
    }

    async function withBusy(fn) {
      if (state.busy) return;
      state.busy = true;
      ["runBtn", "startBtn", "stopBtn", "researchBtn", "webBtn", "agentBtn", "qaBtn", "mobileQaBtn"].forEach((id) => $(id).disabled = true);
      try { await fn(); } finally {
        state.busy = false;
        ["runBtn", "startBtn", "stopBtn", "researchBtn", "webBtn", "agentBtn", "qaBtn", "mobileQaBtn"].forEach((id) => $(id).disabled = false);
      }
    }

    $("refreshBtn").onclick = refresh;
    $("runBtn").onclick = () => withBusy(async () => {
      await postJson("/api/run-once", formBody());
      await refresh();
    });
    $("startBtn").onclick = () => withBusy(async () => {
      await postJson("/api/start-loop", formBody());
      await refresh();
    });
    $("stopBtn").onclick = () => withBusy(async () => {
      await postJson("/api/stop-loop", {});
      await refresh();
    });
    $("researchBtn").onclick = () => withBusy(async () => {
      await postJson("/api/research-cycle", { limit: Number($("countInput").value || 5), use_ai: $("useAiInput").checked });
      await refresh();
    });
    $("webBtn").onclick = () => withBusy(async () => {
      await postJson("/api/web-evidence", { limit: 3, search_limit: 5, fetch_limit: 3 });
      await refresh();
    });
    $("agentBtn").onclick = () => withBusy(async () => {
      await postJson("/api/agent-council", { limit: 3, use_ai: $("useAiInput").checked });
      await refresh();
    });
    $("qaBtn").onclick = () => withBusy(async () => {
      await postJson("/api/human-qa", { question: $("questionInput").value });
      await refresh();
    });
    $("mobileQaBtn").onclick = () => withBusy(async () => {
      const question = $("mobileQuestionInput").value.trim();
      if (!question) return;
      $("questionInput").value = question;
      await postJson("/api/human-qa", { question });
      $("mobileQuestionInput").value = "";
      await refresh();
    });

    refresh();
    setInterval(refresh, 10000);
  </script>
</body>
</html>
